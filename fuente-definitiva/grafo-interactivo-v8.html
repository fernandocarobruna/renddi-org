<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENSEI | GRAFO v2 — Motor de Rendimiento Estudiantil</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<style>
:root{--bg:#0f1923;--bg2:#1a2733;--bg3:#243447;--text:#e8e8e8;--text2:#a0b4c8;--primary:#1B4F72;--accent:#F39C12;--success:#27AE60;--danger:#E74C3C;--warning:#F39C12;--card:#1a2733;--border:#2c3e50;--radius:10px;--shadow:0 4px 20px rgba(0,0,0,0.3)}
[data-theme="light"]{--bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8ecf1;--text:#1a1a2e;--text2:#555;--card:#fff;--border:#ddd;--shadow:0 4px 20px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.header{background:linear-gradient(135deg,#1B4F72,#2471A3);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.header h1{font-size:1.3em;font-weight:700;color:#fff;letter-spacing:1px}
.header h1 span{color:#F39C12}
.theme-toggle{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.85em;transition:all .2s}
.theme-toggle:hover{background:rgba(255,255,255,.25)}
.nav-tabs{display:flex;background:var(--bg2);border-bottom:2px solid var(--border);padding:0 16px;overflow-x:auto;gap:2px}
.nav-tab{padding:10px 18px;cursor:pointer;border:none;background:none;color:var(--text2);font-size:.85em;font-weight:500;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:var(--text);background:var(--bg3)}
.nav-tab.active{color:#F39C12;border-bottom-color:#F39C12;font-weight:700}
.student-selector{display:flex;gap:8px;padding:12px 16px;background:var(--bg2);overflow-x:auto;border-bottom:1px solid var(--border)}
.student-card-mini{padding:8px 14px;border-radius:8px;cursor:pointer;background:var(--bg3);border:2px solid transparent;transition:all .2s;text-align:center;min-width:110px;flex-shrink:0}
.student-card-mini:hover{border-color:var(--accent);transform:translateY(-2px)}
.student-card-mini.active{border-color:#F39C12;background:rgba(243,156,18,.15)}
.student-card-mini .sname{font-size:.8em;font-weight:700;color:var(--text)}
.student-card-mini .salias{font-size:.7em;color:var(--accent)}
.student-card-mini .spaes{font-size:.75em;color:var(--text2);margin-top:2px}
.tab-content{display:none;padding:20px;min-height:calc(100vh - 180px)}
.tab-content.active{display:block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start}
.card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.chart-wrap{position:relative;width:100%;height:340px;max-height:340px;overflow:hidden}
.chart-wrap canvas{width:100%!important;height:100%!important}
.card h3{font-size:1em;margin-bottom:10px;color:var(--accent);display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.72em;font-weight:600}
.badge-green{background:rgba(39,174,96,.2);color:#27AE60}
.badge-yellow{background:rgba(243,156,18,.2);color:#F39C12}
.badge-red{background:rgba(231,76,60,.2);color:#E74C3C}
.badge-blue{background:rgba(52,152,219,.2);color:#3498db}
.badge-gray{background:rgba(160,180,200,.15);color:var(--text2)}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.85em;font-weight:600;transition:all .2s}
.btn-primary{background:#F39C12;color:#fff}
.btn-primary:hover{background:#e08e0b;transform:translateY(-1px)}
.btn-sm{padding:5px 12px;font-size:.78em}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-outline:hover{background:var(--accent);color:#fff}
.progress-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:4px 0}
.progress-bar .fill{height:100%;border-radius:4px;transition:width .5s}
.var-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.82em}
.var-row .var-name{width:150px;color:var(--text2);flex-shrink:0}
.var-row .var-bar{flex:1}
.var-row .var-val{width:50px;text-align:right;font-weight:600;font-size:.85em}
table{width:100%;border-collapse:collapse;font-size:.82em}
th{background:var(--bg3);padding:8px 10px;text-align:left;font-weight:600;color:var(--accent);border-bottom:2px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(243,156,18,.05)}
.recipe-card{border-left:4px solid var(--accent);padding:12px 16px;margin:8px 0;background:var(--bg3);border-radius:0 8px 8px 0}
.recipe-card h4{color:var(--accent);margin-bottom:6px;font-size:.9em}
.agent-tag{padding:2px 8px;border-radius:4px;font-size:.72em;font-weight:600;color:#fff;display:inline-block}
.flow-step{padding:16px;margin:8px 0;border-radius:8px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.flow-step:hover{border-color:var(--accent)}
.flow-step.expanded{border-color:var(--accent);background:var(--bg2)}
.step-num{display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;text-align:center;line-height:28px;font-weight:700;font-size:.85em;margin-right:10px}
.step-content{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.flow-step.expanded .step-content{display:block}
.career-card{padding:14px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);transition:all .2s}
.career-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.career-card h4{font-size:.9em;color:var(--text);margin-bottom:8px}
.career-stat{display:flex;justify-content:space-between;font-size:.78em;padding:3px 0;color:var(--text2)}
.career-stat span:last-child{font-weight:600;color:var(--text)}
.myth-card{padding:16px;border-radius:8px;background:linear-gradient(135deg,rgba(243,156,18,.08),rgba(52,152,219,.08));border:1px solid var(--border)}
.myth-card h4{color:var(--danger);font-size:.9em;margin-bottom:6px}
.myth-card .truth{color:var(--success);font-size:.85em;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.insight-card{padding:12px;border-radius:8px;background:var(--bg3);border-left:3px solid var(--accent);margin:6px 0}
.agent-section{margin:12px 0;padding:12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border)}
.agent-section h4{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.92em}
.agent-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8em;color:#fff;font-weight:700;flex-shrink:0}
.action-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:.82em}
.action-status{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.action-active{background:#27AE60}
.action-recommended{background:#F39C12}
.action-notneeded{background:var(--bg);border:1px solid var(--text2)}
.heatmap-cell{width:100%;height:28px;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:600;border-radius:3px}
.simulator-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px;background:var(--bg3);border-radius:8px;margin-bottom:12px}
.simulator-controls select{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:.85em}
.paes-big{font-size:2.2em;font-weight:800;color:var(--accent);line-height:1}
.paes-label{font-size:.75em;color:var(--text2)}
.delta-pos{color:#27AE60}
.delta-neg{color:#E74C3C}
.kit-card{padding:16px;border-radius:10px;background:linear-gradient(135deg,rgba(39,174,96,.1),rgba(52,152,219,.1));border:1px solid rgba(39,174,96,.3);margin:8px 0}
.kit-card h4{color:#27AE60;margin-bottom:8px;font-size:.95em}
.kit-card li{font-size:.85em;padding:4px 0;color:var(--text)}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
@media print{.header,.nav-tabs,.student-selector,.theme-toggle{display:none}.tab-content{display:block!important;page-break-inside:avoid}.card{break-inside:avoid;border:1px solid #ccc}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* FAD Expanded Action Panel Styles */
.fad-expand-row td{padding:0!important;border-bottom:2px solid var(--accent)}
.fad-panel{overflow:hidden;transition:max-height .4s ease,opacity .3s ease;max-height:0;opacity:0}
.fad-panel.open{max-height:3000px;opacity:1}
.fad-panel-inner{padding:20px 24px;background:linear-gradient(135deg,rgba(243,156,18,.03),rgba(52,152,219,.03));border-left:4px solid var(--accent)}
.fad-section{margin-bottom:16px;padding:14px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)}
.fad-section:last-child{margin-bottom:0}
.fad-section-title{font-size:.9em;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.fad-section-title .fad-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75em;color:#fff;flex-shrink:0}
.fad-phase{display:flex;gap:12px;align-items:flex-start;padding:10px 12px;margin:6px 0;background:var(--bg3);border-radius:8px;border-left:3px solid var(--accent);transition:all .2s}
.fad-phase:hover{border-left-color:#3498db}
.fad-phase-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8em;font-weight:700;color:#fff;flex-shrink:0}
.fad-phase-body{flex:1;font-size:.82em}
.fad-phase-title{font-weight:700;color:var(--text);margin-bottom:4px}
.fad-phase-detail{color:var(--text2);line-height:1.5}
.fad-phase-meta{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.fad-phase-tag{padding:2px 8px;border-radius:10px;font-size:.75em;background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.fad-metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.fad-metric-card{padding:10px;background:var(--bg3);border-radius:8px;text-align:center}
.fad-metric-val{font-size:1.4em;font-weight:800}
.fad-metric-label{font-size:.72em;color:var(--text2);margin-top:2px}
.fad-gauge{width:100%;height:10px;background:var(--bg);border-radius:5px;overflow:hidden;margin-top:6px}
.fad-gauge-fill{height:100%;border-radius:5px;transition:width .5s}
.fad-cond{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;margin:4px 0;font-size:.82em;background:var(--bg3);border-radius:6px}
.fad-cond-icon{flex-shrink:0;width:20px;text-align:center}
.fad-evo-timeline{display:flex;align-items:flex-end;gap:0;height:80px;padding:8px 0;position:relative}
.fad-evo-bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative}
.fad-evo-fill{width:70%;border-radius:4px 4px 0 0;transition:height .5s;min-height:4px}
.fad-evo-val{font-size:.7em;font-weight:700;margin-bottom:2px}
.fad-evo-label{font-size:.65em;color:var(--text2);margin-top:4px;text-align:center}
.fad-causal-chain{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:8px 0;font-size:.82em}
.fad-causal-node{padding:4px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-weight:600}
.fad-causal-arrow{color:var(--accent);font-weight:700;font-size:1.1em}
.fad-row-clickable{cursor:pointer;transition:background .15s}
.fad-row-clickable:hover td{background:rgba(243,156,18,.08)!important}
.fad-row-clickable.active td{background:rgba(243,156,18,.12)!important;border-bottom-color:transparent}

/* MIYAGI Chatbot Styles */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 200px);max-height:700px}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-input-area{display:flex;gap:8px;padding:12px 16px;background:var(--bg3);border-top:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius)}
.chat-input-area input{flex:1;padding:10px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:.9em;outline:none;transition:border-color .2s}
.chat-input-area input:focus{border-color:var(--accent)}
.chat-input-area button{padding:10px 20px;border-radius:20px;border:none;background:#F39C12;color:#fff;font-weight:700;cursor:pointer;font-size:.9em;transition:all .2s}
.chat-input-area button:hover{background:#e08e0b;transform:scale(1.03)}
.chat-msg{max-width:85%;animation:fadeIn .3s ease}
.chat-msg-user{align-self:flex-end;background:rgba(52,152,219,.25);color:var(--text);padding:10px 16px;border-radius:16px 16px 4px 16px;font-size:.88em}
.chat-msg-miyagi{align-self:center;background:rgba(243,156,18,.08);border:1px solid rgba(243,156,18,.3);padding:10px 16px;border-radius:12px;font-size:.88em;color:var(--accent);text-align:center;font-style:italic}
.chat-msg-agent{align-self:flex-start;max-width:88%;display:flex;gap:10px;align-items:flex-start}
.chat-agent-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8em;color:#fff;font-weight:700;flex-shrink:0}
.chat-agent-body{background:var(--bg3);border-radius:4px 16px 16px 16px;padding:12px 16px;border-left:3px solid transparent;flex:1}
.chat-agent-name{font-weight:700;font-size:.82em;margin-bottom:4px}
.chat-agent-text{font-size:.85em;line-height:1.5;color:var(--text)}
.chat-agent-refs{font-size:.75em;color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.chat-synthesis{align-self:flex-start;background:rgba(243,156,18,.06);border:1px solid rgba(243,156,18,.2);border-left:3px solid #F39C12;padding:12px 16px;border-radius:4px 12px 12px 12px;font-size:.85em;max-width:88%}
.chat-synthesis strong{color:var(--accent)}
.chat-welcome{text-align:center;padding:30px;color:var(--text2)}
.chat-welcome h3{color:var(--accent);margin-bottom:8px}
.chat-welcome .topics{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px}
.chat-welcome .topic-chip{padding:4px 12px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);font-size:.78em;cursor:pointer;transition:all .2s}
.chat-welcome .topic-chip:hover{border-color:var(--accent);color:var(--accent)}
.chat-typing{align-self:flex-start;padding:8px 16px;font-size:.82em;color:var(--text2);font-style:italic}
.chat-typing .dots{display:inline-block}
.chat-typing .dots span{animation:blink 1.4s infinite both;font-size:1.2em}
.chat-typing .dots span:nth-child(2){animation-delay:.2s}
.chat-typing .dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

/* Enhanced Graph Tooltip Styles */
.graph-tooltip{position:absolute;pointer-events:none;background:rgba(15,25,35,.95);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:14px 16px;max-width:380px;z-index:1000;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;transition:opacity .2s ease;font-size:.82em;line-height:1.5;backdrop-filter:blur(8px)}
.graph-tooltip.visible{opacity:1}
.graph-tooltip .tt-header{font-weight:700;font-size:1.05em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1)}
.graph-tooltip .tt-def{color:#a0b4c8;margin-bottom:8px;font-size:.92em}
.graph-tooltip .tt-value-section{margin-bottom:8px}
.graph-tooltip .tt-scale-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;position:relative;margin:4px 0}
.graph-tooltip .tt-scale-fill{height:100%;border-radius:4px;transition:width .3s}
.graph-tooltip .tt-scale-labels{display:flex;justify-content:space-between;font-size:.75em;color:#888}
.graph-tooltip .tt-section-title{font-weight:600;color:var(--accent);margin:8px 0 4px;font-size:.9em;border-top:1px solid rgba(255,255,255,.08);padding-top:8px}
.graph-tooltip .tt-edge-item{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:.88em}
.graph-tooltip .tt-edge-pos{color:#27AE60}
.graph-tooltip .tt-edge-neg{color:#E74C3C}
.graph-tooltip .tt-meta{display:flex;justify-content:space-between;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08);font-size:.85em;color:#a0b4c8}
.graph-tooltip .tt-rank{font-weight:700}
.graph-tooltip-edge{position:absolute;pointer-events:none;background:rgba(15,25,35,.95);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 16px;max-width:360px;z-index:1000;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;transition:opacity .2s ease;font-size:.82em;line-height:1.5;backdrop-filter:blur(8px)}
.graph-tooltip-edge.visible{opacity:1}

/* Consultoria Tab Styles */
.consul-subtabs{display:flex;gap:4px;padding:8px 0;margin-bottom:16px;flex-wrap:wrap}
.consul-subtab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:.82em;font-weight:600;transition:all .2s}
.consul-subtab:hover{border-color:var(--accent);color:var(--text)}
.consul-subtab.active{background:rgba(243,156,18,.15);border-color:#F39C12;color:#F39C12}
.consul-subview{display:none}
.consul-subview.active{display:block}
.flow-map-container{position:relative;width:100%;height:520px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.flow-map-container svg{width:100%;height:100%}
.flow-node{cursor:pointer;transition:all .2s}
.flow-node:hover rect{stroke:#F39C12;stroke-width:2.5}
.flow-detail-panel{padding:16px;background:var(--bg2);border:1px solid var(--accent);border-radius:var(--radius);margin-top:12px;animation:fadeIn .3s ease}
.flow-detail-panel h4{color:var(--accent);margin-bottom:10px;font-size:1em}
.flow-detail-row{display:flex;gap:8px;align-items:flex-start;padding:6px 0;font-size:.85em;border-bottom:1px solid var(--border)}
.flow-detail-row:last-child{border-bottom:none}
.flow-detail-label{min-width:130px;color:var(--text2);font-weight:600;flex-shrink:0}
.flow-detail-value{color:var(--text);flex:1}
.timeline-container{position:relative;padding:20px 0;overflow-x:auto}
.timeline-track{display:flex;align-items:flex-start;gap:0;min-width:800px;position:relative;padding:60px 20px 20px}
.timeline-track::before{content:'';position:absolute;top:78px;left:40px;right:40px;height:3px;background:linear-gradient(90deg,var(--accent),#3498db);border-radius:2px}
.timeline-event{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:120px}
.timeline-dot{width:18px;height:18px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);box-shadow:0 0 0 2px var(--accent);z-index:2;position:relative}
.timeline-time{font-size:.75em;color:var(--accent);font-weight:700;margin-bottom:8px}
.timeline-label{font-size:.78em;color:var(--text);text-align:center;margin-top:10px;font-weight:600;max-width:110px}
.timeline-agent{font-size:.7em;color:var(--text2);text-align:center;margin-top:4px}
.timeline-desc{font-size:.72em;color:var(--text2);text-align:center;margin-top:2px;max-width:130px}
.crisis-card{padding:16px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.crisis-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.crisis-card.expanded{border-color:var(--accent);background:var(--bg2)}
.crisis-card h4{font-size:.9em;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.crisis-card .crisis-icon{font-size:1.1em}
.crisis-card p{font-size:.8em;color:var(--text2);line-height:1.4}
.crisis-protocol{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.crisis-card.expanded .crisis-protocol{display:block}
.protocol-step{display:flex;gap:10px;padding:8px 0;font-size:.82em;align-items:flex-start}

let trend=v.neg?-str*.028:str*.024;
if(w===3||w===7)trend*=.4;
const noise=(rng(ri++)-.5)*.018;
st[v.id]=clamp(st[v.id]+trend+noise)});
EDGES.forEach(e=>{const d=st[e.from]-data[w][e.from];if(Math.abs(d)>.005)st[e.to]=clamp(st[e.to]+d*e.w*.3)})}}

const base=level===0?-.003:level===1?.012:.022;
const noise=(Math.sin(seed+w*137)*.5+.5-.5)*.008;
m=clamp(m+(base*(1-w*.02))+noise)}}return d}

function getRecipes(s){
const r=[];
if(s.anxiety>.6)r.push({name:'Protocolo Anti-Ansiedad',agents:['kaze','sensei','shukan'],acts:['Respiracion de caja + Defusion cognitiva','Modo sin timer, sesiones cortas','Micro-habitos de 5 min'],exp:{anxiety:-.20,mastery:.08,confidence:.10},pi:Math.round(.08*900),tl:'4-6 semanas'});

if(s.sleep_quality<.5)r.push({name:'Habito de Sueno',agents:['kokoro','shukan'],acts:['Deteccion horarios extremos','Notificacion 22:00 "a dormir"','Reduccion screen_time'],exp:{sleep_quality:.20,attention_span:.12,fatigue:-.15},pi:Math.round(.07*900),tl:'3-4 semanas'});
if(s.study_adherence<.5)r.push({name:'Protocolo Habito de Estudio',agents:['shukan','sensei','nakama'],acts:['Micro-habito + escalamiento','Sesiones adaptativas cortas','Pomodoro grupal'],exp:{study_adherence:.25,mastery:.10,motivation:.08},pi:Math.round(.10*900),tl:'6-8 semanas'});
if(s.fatigue>.6||s.emotional_state<.4)r.push({name:'Protocolo Anti-Burnout',agents:['kokoro','kaze','shukan'],acts:['Modo Suave activado','Pausas activas obligatorias','Reduccion de carga progresiva'],exp:{fatigue:-.20,emotional_state:.15,cognitive_load:-.10},pi:Math.round(.05*900),tl:'2-4 semanas'});
if(s.screen_time>.6)r.push({name:'Desintoxicacion Digital',agents:['shukan','kokoro'],acts:['Limites pantalla progresivos','Gamificacion tiempo offline','Alertas inteligentes'],exp:{screen_time:-.25,sleep_quality:.15,attention_span:.10},pi:Math.round(.06*900),tl:'4-6 semanas'});
if(s.social_support<.5&&s.motivation<.5)r.push({name:'Red de Apoyo',agents:['nakama','compass'],acts:['Study buddy matching','Grupo de estudio','Desafios grupales'],exp:{social_support:.20,motivation:.12,emotional_state:.08},pi:Math.round(.05*900),tl:'3-5 semanas'});

return r.slice(0,5)}

function calcImpactRanking(){
const scores={};
VARS.forEach(v=>{scores[v.id]=0});
EDGES.forEach(e=>{scores[e.from]=(scores[e.from]||0)+Math.abs(e.w);scores[e.to]=(scores[e.to]||0)+Math.abs(e.w)});
const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
const ranking={};sorted.forEach(([id,sc],i)=>{ranking[id]={rank:i+1,score:sc.toFixed(2)}});
return ranking}

function renderNet(s){
const ctn=document.getElementById('netG');if(!ctn)return;ctn.innerHTML='';
const W=ctn.clientWidth||550,H=420;
const svg=d3.select(ctn).append('svg').attr('width',W).attr('height',H);
svg.append('defs').append('marker').attr('id','ah').attr('viewBox','0 -5 10 10').attr('refX',22).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto').append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#666');
const nodes=VARS.map(v=>({id:v.id,label:v.label,neg:v.neg,value:s[v.id],color:vc(s[v.id],v.neg)}));
const links=EDGES.map(e=>({source:e.from,target:e.to,weight:e.w}));
const sim=d3.forceSimulation(nodes).force('link',d3.forceLink(links).id(d=>d.id).distance(90)).force('charge',d3.forceManyBody().strength(-180)).force('center',d3.forceCenter(W/2,H/2)).force('collision',d3.forceCollide().radius(22));
/* Tooltip elements */
let nodeTT=document.getElementById('graphNodeTT');
if(!nodeTT){nodeTT=document.createElement('div');nodeTT.id='graphNodeTT';nodeTT.className='graph-tooltip';document.body.appendChild(nodeTT)}
let edgeTT=document.getElementById('graphEdgeTT');
if(!edgeTT){edgeTT=document.createElement('div');edgeTT.id='graphEdgeTT';edgeTT.className='graph-tooltip-edge';document.body.appendChild(edgeTT)}
function positionTT(tt,ev){
const pad=12;let x=ev.pageX+pad,y=ev.pageY+pad;
const r=tt.getBoundingClientRect();
if(x+r.width>window.innerWidth-pad)x=ev.pageX-r.width-pad;
if(y+r.height>window.innerHeight-pad)y=ev.pageY-r.height-pad;
tt.style.left=x+'px';tt.style.top=y+'px'}
const link=svg.append('g').selectAll('line').data(links).enter().append('line')
.attr('stroke',d=>d.weight>0?'#27AE60':'#E74C3C').attr('stroke-width',d=>Math.abs(d.weight)*3.5).attr('stroke-opacity',.4).attr('marker-end','url(#ah)');
/* Invisible wider lines for easier edge hovering */
svg.append('g').selectAll('line').data(links).enter().append('line')
.attr('stroke','transparent').attr('stroke-width',12).attr('class','edge-hover-target')
.on('mouseover',function(ev,d){edgeTT.innerHTML=buildEdgeTooltipHTML(d);edgeTT.classList.add('visible');positionTT(edgeTT,ev);d3.select(this.previousSibling||link.filter(l=>l===d).node()).attr('stroke-opacity',.9)})
.on('mousemove',function(ev){positionTT(edgeTT,ev)})
.on('mouseout',function(ev,d){edgeTT.classList.remove('visible');link.attr('stroke-opacity',.4)});
const node=svg.append('g').selectAll('g').data(nodes).enter().append('g').call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
node.append('circle').attr('r',d=>7+d.value*9).attr('fill',d=>d.color).attr('stroke','#fff').attr('stroke-width',1.5);
node.append('text').text(d=>d.label).attr('dy',d=>-(10+d.value*9)).attr('text-anchor','middle').attr('fill','#ccc').attr('font-size','8px');
node.on('mouseover',function(ev,d){nodeTT.innerHTML=buildNodeTooltipHTML(d,s);nodeTT.classList.add('visible');positionTT(nodeTT,ev);d3.select(this).select('circle').attr('stroke','#F39C12').attr('stroke-width',3)})
.on('mousemove',function(ev){positionTT(nodeTT,ev)})
.on('mouseout',function(){nodeTT.classList.remove('visible');d3.select(this).select('circle').attr('stroke','#fff').attr('stroke-width',1.5)});
const edgeHoverLines=svg.selectAll('.edge-hover-target');
sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);edgeHoverLines.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`)})}

function runSim(){

changes.sort((a,b)=>Math.abs(b.ch)-Math.abs(a.ch));
let h=`<div style="padding:12px;background:var(--bg3);border-radius:8px;margin-top:8px">

<div><strong>PAES:</strong> ${pb} > ${pa} (<span class="${diff>=0?'delta-pos':'delta-neg'}">${diff>=0?'+':''}${diff}</span>)</div></div>`;
changes.forEach(c=>{const col=c.ch>0?(c.neg?'#E74C3C':'#27AE60'):(c.neg?'#27AE60':'#E74C3C');

h+='</div>';document.getElementById('simR').innerHTML=h}

function calcUrgency(vid,val){
const t=FAD_URG_THRESHOLDS[vid];if(!t)return 1.0;
let sev=val;if(t.dir==='low')sev=1-val;
const alertT=t.dir==='low'?1-t.alert:t.alert;
const critT=t.dir==='low'?1-t.crit:t.crit;
if(sev<alertT)return 1.0;
if(critT===alertT)return 1.5;
return 1.0+0.5*Math.min(1.0,Math.max(0,(sev-alertT)/(critT-alertT)));
}

return{wright,gap:parseFloat(gap.toFixed(3)),interv,urg:parseFloat(urg.toFixed(2)),conf,priority:parseFloat((wright*gap*interv*urg*conf).toFixed(4))};
}

function normalize(str){return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}

function miyagiQuery(msg){
const nm=normalize(msg);
const matches=[];
Object.entries(MIYAGI_KB).forEach(([agKey,agent])=>{
agent.topics.forEach(topic=>{
const score=topic.kw.reduce((acc,kw)=>{return acc+(nm.includes(normalize(kw))?1:0)},0);
if(score>0)matches.push({agKey,agent,topic,score})})});
matches.sort((a,b)=>b.score-a.score);
const seen=new Set();const unique=[];
matches.forEach(m=>{const k=m.agKey+':'+m.topic.resp.substring(0,40);if(!seen.has(k)){seen.add(k);unique.push(m)}});
return unique.slice(0,3)}

function renderFlujoD3(blocks, agents, student){
const container=document.getElementById('flujoSvg');
if(!container) return;
const W=Math.max(container.clientWidth,900);
const H=650;

const svg=d3.select(container).html('').append('svg')
.attr('width',W).attr('height',H)
.attr('viewBox',`0 0 ${W} ${H}`)
.style('font-family','system-ui,sans-serif');

// Background gradient
const defs=svg.append('defs');
const grad=defs.append('linearGradient').attr('id','flowGrad').attr('x1','0%').attr('y1','0%').attr('x2','100%').attr('y2','0%');
grad.append('stop').attr('offset','0%').attr('style','stop-color:#9B59B6;stop-opacity:0.15');
grad.append('stop').attr('offset','50%').attr('style','stop-color:#3498DB;stop-opacity:0.08');
grad.append('stop').attr('offset','100%').attr('style','stop-color:#27AE60;stop-opacity:0.15');

// Arrow marker
defs.append('marker').attr('id','arrowFlow').attr('viewBox','0 0 10 10').attr('refX',10).attr('refY',5).attr('markerWidth',8).attr('markerHeight',8).attr('orient','auto')
.append('path').attr('d','M 0 0 L 10 5 L 0 10 z').attr('fill','var(--accent)');

// Layout: 3 columns
const colDiag=120, colVars=W/2, colAgents=W-140;
const diagY0=60;

// Title
svg.append('text').attr('x',W/2).attr('y',30).attr('text-anchor','middle').attr('fill','var(--accent)').attr('font-size','16px').attr('font-weight','bold').text('FLUJO: Diagnostico Inicial → Grafo Causal (21 vars) → 9 Agentes');

// Column labels
svg.append('text').attr('x',colDiag).attr('y',55).attr('text-anchor','middle').attr('fill','var(--text2)').attr('font-size','11px').text('DIAGNOSTICO');
svg.append('text').attr('x',colVars).attr('y',55).attr('text-anchor','middle').attr('fill','var(--text2)').attr('font-size','11px').text('VARIABLES DEL GRAFO (21)');
svg.append('text').attr('x',colAgents).attr('y',55).attr('text-anchor','middle').attr('fill','var(--text2)').attr('font-size','11px').text('AGENTES (9)');

// Draw diagnostic blocks (left column)
const activeBlocks=blocks.filter(b=>b.vars.length>0);
const diagSpacing=Math.min(100,(H-100)/activeBlocks.length);
activeBlocks.forEach((b,i)=>{
const y=diagY0+30+i*diagSpacing;
b._y=y;b._x=colDiag;
const g=svg.append('g').attr('transform',`translate(${colDiag},${y})`).style('cursor','pointer');
g.append('rect').attr('x',-55).attr('y',-18).attr('width',110).attr('height',36).attr('rx',8).attr('fill',b.color+'20').attr('stroke',b.color).attr('stroke-width',1.5);
g.append('text').attr('text-anchor','middle').attr('dy',1).attr('fill',b.color).attr('font-size','11px').attr('font-weight','bold').text(b.emoji+' '+b.id);
g.append('text').attr('text-anchor','middle').attr('dy',14).attr('fill','var(--text2)').attr('font-size','8px').text(b.label);
});

// Draw variables (center) - grouped by category
const varCategories=[
{label:'Academicas',ids:['mastery','attention_span','metacognition','cognitive_load'],color:'#E74C3C'},
{label:'Emocionales',ids:['anxiety','confidence','emotional_state','self_efficacy','frustration_tolerance','stress_level'],color:'#3498DB'},
{label:'Habitos',ids:['study_adherence','time_management','sleep_quality','screen_time','fatigue'],color:'#27AE60'},
{label:'Sociales',ids:['social_support','parental_support'],color:'#9B59B6'},
{label:'Vocacionales',ids:['vocational_clarity','motivation','growth_mindset'],color:'#1ABC9C'},
{label:'Bienestar',ids:['physical_activity'],color:'#F39C12'}
];

let varY=diagY0+20;
const varPositions={};
varCategories.forEach(cat=>{
svg.append('text').attr('x',colVars-80).attr('y',varY).attr('fill',cat.color).attr('font-size','9px').attr('font-weight','bold').text(cat.label);
varY+=4;
cat.ids.forEach(vid=>{
varY+=20;
const vd=VARS.find(v=>v.id===vid);
const val=student[vid];
const c=vd.neg?(val<=.3?'#27AE60':val<=.6?'#F39C12':'#E74C3C'):(val>=.7?'#27AE60':val>=.4?'#F39C12':'#E74C3C');
varPositions[vid]={x:colVars,y:varY};

const g=svg.append('g').attr('transform',`translate(${colVars},${varY})`);
g.append('rect').attr('x',-75).attr('y',-9).attr('width',150).attr('height',18).attr('rx',4).attr('fill','var(--bg3)').attr('stroke',c+'60').attr('stroke-width',1);
// Value bar
const barW=Math.max(2,val*80);
g.append('rect').attr('x',-74).attr('y',-8).attr('width',barW).attr('height',16).attr('rx',3).attr('fill',c+'30');
g.append('text').attr('x',-70).attr('dy',4).attr('fill','var(--text)').attr('font-size','8px').text(vd.label);
g.append('text').attr('x',70).attr('dy',4).attr('text-anchor','end').attr('fill',c).attr('font-size','8.5px').attr('font-weight','bold').text((val*100).toFixed(0)+'%');
});
varY+=10;
});

// Draw agents (right column)
const filteredAgents=agents.filter(a=>a.id!=='MIYAGI');
const agentSpacing=Math.min(65,(H-100)/filteredAgents.length);
filteredAgents.forEach((a,i)=>{
const y=diagY0+40+i*agentSpacing;
a._y=y;a._x=colAgents;
const g=svg.append('g').attr('transform',`translate(${colAgents},${y})`);
g.append('rect').attr('x',-55).attr('y',-16).attr('width',110).attr('height',32).attr('rx',8).attr('fill',a.color+'15').attr('stroke',a.color).attr('stroke-width',1.5);
g.append('text').attr('text-anchor','middle').attr('dy',1).attr('fill',a.color).attr('font-size','11px').attr('font-weight','bold').text(a.emoji+' '+a.label);
g.append('text').attr('text-anchor','middle').attr('dy',13).attr('fill','var(--text2)').attr('font-size','7px').text(a.role);
});

// Draw connections: Diagnostic → Variables
activeBlocks.forEach(b=>{
b.vars.forEach(vid=>{
const vp=varPositions[vid];
if(!vp) return;
svg.append('path')
.attr('d',`M${b._x+55},${b._y} C${b._x+100},${b._y} ${vp.x-120},${vp.y} ${vp.x-75},${vp.y}`)
.attr('fill','none').attr('stroke',b.color+'50').attr('stroke-width',1.2)
.attr('stroke-dasharray','4,3').attr('marker-end','url(#arrowFlow)');
});
});

// Draw connections: Variables → Agents
filteredAgents.forEach(a=>{
a.reads.forEach(vid=>{
const vp=varPositions[vid];
if(!vp) return;
svg.append('path')
.attr('d',`M${vp.x+75},${vp.y} C${vp.x+120},${vp.y} ${a._x-100},${a._y} ${a._x-55},${a._y}`)
.attr('fill','none').attr('stroke',a.color+'35').attr('stroke-width',1)
.attr('stroke-dasharray','3,3');
});
});

// MIYAGI at bottom center
const myY=H-30;
svg.append('rect').attr('x',colVars-70).attr('y',myY-15).attr('width',140).attr('height',30).attr('rx',10).attr('fill','var(--accent)'+'20').attr('stroke','var(--accent)').attr('stroke-width',2);
svg.append('text').attr('x',colVars).attr('y',myY+5).attr('text-anchor','middle').attr('fill','var(--accent)').attr('font-size','13px').attr('font-weight','bold').text('🥋 MIYAGI — Orquestador');
svg.append('text').attr('x',colVars).attr('y',myY+18).attr('text-anchor','middle').attr('fill','var(--text2)').attr('font-size','8px').text('Lee TODAS las variables · Coordina los 8 agentes');
}

const flowSelect = document.getElementById('ecoFlowSelect');
const flowDesc = document.getElementById('ecoFlowDesc');
function applyFlow(flowKey){
  const flow = flows[flowKey];
  if(!flow)return;
  flowDesc.textContent = flow.desc;
  // Highlight/dim agents
  agentNodes.forEach(n=>{
    const k = n.dataset.agent;
    const active = flow.agents.includes(k);
    n.style.opacity = active?'1':'0.2';
    n.style.transition = 'opacity 0.5s';
  });
  // Highlight/dim connections
  connGroups.forEach(g=>{
    const fromK = g.dataset.from, toK = g.dataset.to;
    const active = flow.agents.includes(fromK) && flow.agents.includes(toK);
    g.style.opacity = active?'1':'0.15';
    g.style.transition = 'opacity 0.5s';
  });
}
flowSelect.addEventListener('change',()=>{applyFlow(flowSelect.value);});

// ---- Session simulation ----
let simTimer = null;
let simStep = -1;
const simBtn = document.getElementById('ecoSimBtn');
const simStop = document.getElementById('ecoSimStop');
const simStatus = document.getElementById('ecoSimStatus');
const simStepsCard = document.getElementById('ecoSimSteps');
const simStepsList = document.getElementById('ecoSimStepsList');

function resetSim(){
  simStep = -1;
  if(simTimer){clearTimeout(simTimer);simTimer=null;}
  simBtn.style.display='inline-block';
  simStop.style.display='none';
  simStatus.style.display='none';
  simStepsCard.style.display='none';
  applyFlow(flowSelect.value);
}

function runSimStep(){
  simStep++;
  if(simStep >= simSteps.length){
    simStatus.innerHTML = '<strong style="color:#27AE60">Sesion completa.</strong> Todos los agentes han participado. El grafo se actualizo con los datos de la sesion.';
    setTimeout(resetSim, 4000);
    return;
  }
  const step = simSteps[simStep];
  // Dim all, highlight active
  agentNodes.forEach(n=>{
    const k = n.dataset.agent;
    const active = step.agents.includes(k);
    n.style.opacity = active?'1':'0.15';
    n.style.transition = 'opacity 0.6s';
    if(active){
      const circle = n.querySelector('.eco-node-circle');
      if(circle){
        circle.setAttribute('stroke-width','4');
        setTimeout(()=>circle.setAttribute('stroke-width','2.5'),1500);
      }
    }
  });
  // Highlight active connections
  connGroups.forEach(g=>{
    const fromK = g.dataset.from, toK = g.dataset.to;
    const active = step.conns.some(c=>c.from===fromK && c.to===toK);
    g.style.opacity = active?'1':'0.1';
    g.style.transition = 'opacity 0.6s';
    if(active){
      const vp = g.querySelectorAll('.eco-conn-path');
      vp.forEach(p=>{if(!p.id) p.setAttribute('opacity','0.7');});
    }
  });
  // Update status
  simStatus.innerHTML = '<strong style="color:var(--accent)">Paso '+(simStep+1)+'/'+simSteps.length+':</strong> '+step.text;
  // Update steps list
  let stepsHtml = '';
  simSteps.forEach((s,i)=>{
    const state = i<simStep?'completed':i===simStep?'active':'pending';
    const icon = state==='completed'?'&#10003;':state==='active'?'&#9654;':'&#9675;';
    const iconColor = state==='completed'?'#27AE60':state==='active'?'#F39C12':'#475569';
    const textColor = state==='active'?'var(--text)':'var(--text2)';
    const bg = state==='active'?'rgba(243,156,18,.08)':'transparent';
    stepsHtml += '<div style="display:flex;gap:10px;padding:8px 10px;border-radius:6px;background:'+bg+';margin:2px 0;transition:all .3s">';
    stepsHtml += '<span style="color:'+iconColor+';font-size:1em;min-width:18px;text-align:center">'+icon+'</span>';
    stepsHtml += '<span style="color:'+textColor+';font-size:.82em">'+s.text+'</span>';
    stepsHtml += '</div>';
  });
  simStepsList.innerHTML = stepsHtml;
  simTimer = setTimeout(runSimStep, 2500);
}

simBtn.addEventListener('click',()=>{
  flowSelect.value = 'sesion_diaria';
  simBtn.style.display='none';
  simStop.style.display='inline-block';
  simStatus.style.display='block';
  simStepsCard.style.display='block';
  simStatus.innerHTML = '<em style="color:var(--text2)">Iniciando simulacion de sesion diaria...</em>';
  simTimer = setTimeout(runSimStep, 1000);
});
simStop.addEventListener('click',resetSim);

function renderArqNet(a){
const ctn=document.getElementById('arqDetailNet');if(!ctn)return;ctn.innerHTML='';
const W=ctn.clientWidth||600,H=450;
const svg=d3.select(ctn).append('svg').attr('width',W).attr('height',H);
svg.append('defs').append('marker').attr('id','arqAh').attr('viewBox','0 -5 10 10').attr('refX',22).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto').append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#666');

const nodes=VARS.map(v=>{const val=a.vars[v.id]||0;const eff=v.neg?1-val:val;return{id:v.id,label:v.label,neg:v.neg,value:val,eff:eff,color:vc(val,v.neg)}});
const links=EDGES.map(e=>({source:e.from,target:e.to,weight:e.w}));

const sim=d3.forceSimulation(nodes).force('link',d3.forceLink(links).id(d=>d.id).distance(85)).force('charge',d3.forceManyBody().strength(-160)).force('center',d3.forceCenter(W/2,H/2)).force('collision',d3.forceCollide().radius(d=>8+d.value*12));

const link=svg.append('g').selectAll('line').data(links).enter().append('line')
.attr('stroke',d=>{
const srcVal=a.vars[d.source]||a.vars[d.source.id]||0;const tgtVal=a.vars[d.target]||a.vars[d.target.id]||0;
const srcV=VARS.find(v=>v.id===(d.source.id||d.source));const tgtV=VARS.find(v=>v.id===(d.target.id||d.target));
const srcEff=srcV&&srcV.neg?1-srcVal:srcVal;const tgtEff=tgtV&&tgtV.neg?1-tgtVal:tgtVal;
return(srcEff<.4||tgtEff<.4)?'#E74C3C':'#27AE60'})
.attr('stroke-width',d=>Math.abs(d.weight)*3).attr('stroke-opacity',.35).attr('marker-end','url(#arqAh)');

const node=svg.append('g').selectAll('g').data(nodes).enter().append('g')
.call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

node.append('circle').attr('r',d=>5+d.value*14).attr('fill',d=>d.color).attr('stroke','#fff').attr('stroke-width',1.5).attr('opacity',.85);
node.append('text').text(d=>d.label).attr('dy',d=>-(8+d.value*14)).attr('text-anchor','middle').attr('fill','#ccc').attr('font-size','7px');

// Tooltip on hover
const tt=document.createElement('div');tt.className='graph-tooltip';tt.style.position='fixed';tt.style.pointerEvents='none';tt.style.zIndex='9999';document.body.appendChild(tt);

node.on('mouseover',function(ev,d){
const val=d.value;const effV=d.neg?1-val:val;
const statusText=d.neg?(effV>=.65?'Bajo (bien)':effV>=.35?'Moderado':'Alto (riesgo)'):(effV>=.65?'Optimo':effV>=.35?'Moderado':'Critico');
const statusColor=effV>=.65?'#27AE60':effV>=.35?'#F39C12':'#E74C3C';
const agKey=VAR_AGENT[d.id]||'grafo';const ag=AGENTS[agKey];
let accion='Mantener nivel actual';
if(effV<.35)accion='Intervencion urgente requerida';
else if(effV<.5)accion='Monitorear y reforzar';
tt.innerHTML=`<div style="font-weight:700;color:${statusColor};margin-bottom:4px">${d.label}</div>
<div style="font-size:.9em">Valor: <strong style="color:${statusColor}">${(val*100).toFixed(0)}%</strong> (${statusText})</div>
<div class="tt-scale-bar"><div class="tt-scale-fill" style="width:${val*100}%;background:${statusColor}"></div></div>
<div style="font-size:.85em;color:#a0b4c8;margin-top:4px">Agente: <strong style="color:${ag?ag.color:'#888'}">${ag?ag.name:'GRAFO'}</strong></div>
<div style="font-size:.85em;color:${statusColor};margin-top:4px">Accion: ${accion}</div>`;
tt.classList.add('visible');
d3.select(this).select('circle').attr('stroke','#F39C12').attr('stroke-width',3)})
.on('mousemove',function(ev){tt.style.left=(ev.clientX+12)+'px';tt.style.top=(ev.clientY+12)+'px'})
.on('mouseout',function(){tt.classList.remove('visible');d3.select(this).select('circle').attr('stroke','#fff').attr('stroke-width',1.5)});

sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`)})}

function renderConsulFlujos(){
const el=document.getElementById('consul-flujos');
const agentColors={MIYAGI:'#3498db',SENPAI:'#F39C12',DOJO:'#E74C3C',KAZE:'#E74C3C',KOAN:'#1ABC9C',KAIZEN:'#27AE60',KOTODAMA:'#9B59B6',COMPASS:'#2ECC71',NAKAMA:'#E67E22',IKIGAI:'#F1C40F'};

el.innerHTML=`

<div class="flow-map-container" id="flowMapSvg"></div>
</div>
<div id="flowDetailPanel"></div>
`;

setTimeout(()=>{
const container=document.getElementById('flowMapSvg');
const W=container.clientWidth||900;
const H=520;
const positions=[
{id:'onboarding',x:W*0.12,y:60},{id:'diario',x:W*0.50,y:60},{id:'emocional',x:W*0.85,y:120},
{id:'semanal',x:W*0.20,y:240},{id:'simulacro',x:W*0.50,y:240},{id:'vocacional',x:W*0.80,y:300},
{id:'social',x:W*0.20,y:420},{id:'familiar',x:W*0.55,y:420}
];
const posMap={};positions.forEach(p=>posMap[p.id]=p);

let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
svg+=`<defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#F39C12" opacity="0.6"/></marker></defs>`;

CONSUL_FLOW_CONNECTIONS.forEach(c=>{
const f=posMap[c.from],t=posMap[c.to];
if(f&&t){
const rw=70,rh=22;
const dx=t.x-f.x,dy=t.y-f.y,dist=Math.sqrt(dx*dx+dy*dy);
const nx=dx/dist,ny=dy/dist;
const sx=f.x+nx*rw,sy=f.y+ny*rh;
const ex=t.x-nx*rw,ey=t.y-ny*rh;
const mx=(sx+ex)/2+((Math.abs(dy)<50)?((c.from==='emocional'||c.to==='emocional')?30:0):0);
const my=(sy+ey)/2;
svg+=`<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="rgba(243,156,18,0.3)" stroke-width="1.5" marker-end="url(#arrowhead)"/>`;
}
});

positions.forEach(p=>{
const flow=CONSUL_FLOWS.find(f=>f.id===p.id);
const rw=130,rh=44;
svg+=`<g class="flow-node" onclick="showFlowDetail('${p.id}')">`;
svg+=`<rect x="${p.x-rw/2}" y="${p.y-rh/2}" width="${rw}" height="${rh}" rx="8" fill="${flow.color}22" stroke="${flow.color}" stroke-width="1.5"/>`;
svg+=`<text x="${p.x}" y="${p.y-4}" text-anchor="middle" fill="${flow.color}" font-size="11" font-weight="700">${flow.label.split('/')[0]}</text>`;
if(flow.label.includes('/')){svg+=`<text x="${p.x}" y="${p.y+10}" text-anchor="middle" fill="${flow.color}" font-size="9">${flow.label.split('/')[1]||''}</text>`;}
else{svg+=`<text x="${p.x}" y="${p.y+10}" text-anchor="middle" fill="var(--text2)" font-size="8">${flow.duration}</text>`;}
svg+=`</g>`;
});

svg+=`</svg>`;
container.innerHTML=svg;
},100);
}

const el=document.getElementById('consul-recomendaciones');
const s=STU[selStu];
el.innerHTML=`
<div class="card" style="margin-bottom:16px">
<h3>Motor de Recomendaciones — Algoritmo de Priorizacion Wright</h3>
<p style="font-size:.82em;color:var(--text2);margin-bottom:12px">Selecciona un arquetipo o ajusta las variables manualmente para ver como cambian las recomendaciones. Calculo: impacto = efecto_total x margen x accionabilidad.</p>
<div class="reco-engine">
<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">

${STU.map((st,i)=>`<button class="btn btn-sm ${i===selStu?'btn-primary':'btn-outline'}" onclick="loadRecoProfile(${i})">${st.name}</button>`).join('')}
</div>

</div>
</div>

function initRecoSliders(s){
const container=document.getElementById('recoSliders');
if(!container)return;
const importantVars=['mastery','anxiety','stress_level','sleep_quality','motivation','emotional_state','study_adherence','confidence','self_efficacy','vocational_clarity','physical_activity','fatigue'];
container.innerHTML=importantVars.map(vid=>{
const v=VARS.find(x=>x.id===vid);
const val=Math.round((s[vid]||0.5)*100);
return `<div class="reco-slider-row">
<label>${v?v.label:vid}</label>
<input type="range" min="0" max="100" value="${val}" id="reco-${vid}" oninput="updateRecoEngine()">
<span class="reco-val" id="recoval-${vid}">${val/100}</span>
</div>`;
}).join('');
}

function loadRecoProfile(i){
const s=STU[i];
document.querySelectorAll('#consul-recomendaciones .btn').forEach(b=>{b.classList.remove('btn-primary');b.classList.add('btn-outline')});
event.target.classList.remove('btn-outline');event.target.classList.add('btn-primary');
const importantVars=['mastery','anxiety','stress_level','sleep_quality','motivation','emotional_state','study_adherence','confidence','self_efficacy','vocational_clarity','physical_activity','fatigue'];
importantVars.forEach(vid=>{
const slider=document.getElementById('reco-'+vid);
if(slider){slider.value=Math.round((s[vid]||0.5)*100)}
});
updateRecoEngine();
}

function updateRecoEngine(){
const importantVars=['mastery','anxiety','stress_level','sleep_quality','motivation','emotional_state','study_adherence','confidence','self_efficacy','vocational_clarity','physical_activity','fatigue'];
const profile={};
importantVars.forEach(vid=>{
const slider=document.getElementById('reco-'+vid);
if(slider){
const val=slider.value/100;
profile[vid]=val;
const valEl=document.getElementById('recoval-'+vid);
if(valEl)valEl.textContent=val.toFixed(2);
}
});

const results=[];
Object.keys(EFFECT_TOTAL).forEach(vid=>{
const v=VARS.find(x=>x.id===vid);
if(!v)return;
const val=profile[vid]!==undefined?profile[vid]:0.5;
const margen=v.neg?val:(1-val);
const efecto=EFFECT_TOTAL[vid]||0;
const acc=ACTIONABILITY[vid]||0.1;
const impacto=efecto*margen*acc;
results.push({id:vid,label:v.label,impacto,efecto,margen,acc,val,neg:v.neg});
});

results.sort((a,b)=>b.impacto-a.impacto);

const output=document.getElementById('recoOutput');
if(output){
const burnout=(profile.fatigue||0)>0.70&&(profile.emotional_state||0.5)<0.30;
const highAnx=(profile.anxiety||0)>0.70;
let top5=results.slice(0,7);
let selected=[];
if(burnout){
selected=top5.filter(r=>RECO_ACTIONS[r.id]&&RECO_ACTIONS[r.id].type!=='academica').slice(0,5);
if(selected.length<5)selected=top5.slice(0,5);
}else{
const acad=top5.find(r=>RECO_ACTIONS[r.id]&&RECO_ACTIONS[r.id].type==='academica');
const rest=top5.filter(r=>r!==acad);
if(acad&&!highAnx)selected=[acad,...rest.slice(0,4)];
else selected=top5.slice(0,5);
}

const agentColors={MIYAGI:'#3498db',SENPAI:'#F39C12',DOJO:'#E74C3C',KAZE:'#E74C3C',KOAN:'#1ABC9C',KAIZEN:'#27AE60',KOTODAMA:'#9B59B6',COMPASS:'#2ECC71',NAKAMA:'#E67E22'};
output.innerHTML=selected.map((r,i)=>{
const act=RECO_ACTIONS[r.id];
if(!act)return '';
return `<div class="reco-item">
<div class="reco-rank">${i+1}</div>
<div class="reco-info">
<div class="reco-name">${act.name}</div>
<div class="reco-desc">${act.desc}</div>
<div style="margin-top:4px"><span class="agent-tag" style="background:${agentColors[act.agent]||'#888'}">${act.agent}</span> <span class="badge badge-${act.type==='academica'?'blue':act.type==='emocional'?'red':act.type==='conductual'?'green':'yellow'}">${act.type}</span></div>
</div>
<div class="reco-score">${r.impacto.toFixed(3)}</div>
</div>`;
}).join('')||'<p style="color:var(--text2);font-size:.85em">Sin datos suficientes</p>';

if(burnout)output.innerHTML=`<div class="insight-card" style="margin-bottom:8px;border-left-color:#E74C3C"><strong style="color:#E74C3C">Burnout detectado:</strong> Se priorizan acciones de bienestar. No se incluyen acciones academicas.</div>`+output.innerHTML;
if(highAnx)output.innerHTML=`<div class="insight-card" style="margin-bottom:8px;border-left-color:#F39C12"><strong style="color:#F39C12">Ansiedad alta:</strong> Se priorizan acciones emocionales sobre academicas.</div>`+output.innerHTML;
}

dc('recoChart');
const chartEl=document.getElementById('recoChart');
if(chartEl){
const top10=results.slice(0,10);
charts.recoChart=new Chart(chartEl,{
type:'bar',
data:{
labels:top10.map(r=>r.label),
datasets:[{
label:'Impacto esperado',
data:top10.map(r=>r.impacto),
backgroundColor:top10.map(r=>{const act=RECO_ACTIONS[r.id];if(!act)return'rgba(160,180,200,0.4)';return act.type==='academica'?'rgba(52,152,219,0.6)':act.type==='emocional'?'rgba(231,76,60,0.6)':act.type==='conductual'?'rgba(39,174,96,0.6)':'rgba(243,156,18,0.6)'}),
borderColor:top10.map(r=>{const act=RECO_ACTIONS[r.id];if(!act)return'#aaa';return act.type==='academica'?'#3498db':act.type==='emocional'?'#E74C3C':act.type==='conductual'?'#27AE60':'#F39C12'}),
borderWidth:1
}]
},
options:{
responsive:true,maintainAspectRatio:false,indexAxis:'y',
scales:{x:{beginAtZero:true,ticks:{color:'#888',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#ccc',font:{size:9}},grid:{display:false}}},
plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){const r=top10[ctx.dataIndex];return `Impacto: ${r.impacto.toFixed(3)} (efecto:${r.efecto.toFixed(2)} x margen:${r.margen.toFixed(2)} x acc:${r.acc.toFixed(2)})`}}}}
}
});
}
}
